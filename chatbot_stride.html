<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrideShop – KI-Berater</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0B0B0E;
  --surface:  #131318;
  --surface2: #1B1B22;
  --surface3: #23232C;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #EEEEF2;
  --muted:    #7A7A8A;
  --muted2:   #4E4E5E;
  --accent:   #6C63FF;
  --accent2:  #9B95FF;
  --accent-bg:rgba(108,99,255,0.12);
  --accent-border:rgba(108,99,255,0.25);
  --green:    #4ADE80;
  --green-bg: rgba(74,222,128,0.1);
  --amber:    #FBBF24;
  --red:      #F87171;
  --radius:   12px;
  --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);height:100dvh;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-text-size-adjust:100%}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:1.2rem;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.logo span{color:var(--accent2)}
.nav-links{display:none}
.nav-right{display:flex;align-items:center;gap:.5rem}
.ai-pill{display:flex;align-items:center;gap:.4rem;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:20px;padding:.28rem .7rem;font-size:.68rem;font-weight:600;color:var(--accent2)}
.ai-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.restart-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:.35rem .7rem;border-radius:8px;font-size:.75rem;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
.cart-btn{background:var(--accent);color:#fff;border:none;padding:.38rem .85rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}

/* PROGRESS */
.progress-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:.5rem 1rem;flex-shrink:0}
.progress-bar{max-width:760px;margin:0 auto;display:flex;gap:.4rem;align-items:center}
.progress-step{height:3px;border-radius:2px;flex:1;background:var(--surface3);transition:background .4s}
.progress-step.done{background:var(--accent)}
.progress-step.active{background:var(--accent2)}
.progress-label{font-size:.65rem;color:var(--muted);margin-left:.65rem;white-space:nowrap}

/* CHAT */
.chat-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:1rem .75rem;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* MESSAGE */
.msg{display:flex;gap:.6rem;margin-bottom:1rem;max-width:760px;margin-left:auto;margin-right:auto;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.avatar.bot{background:var(--accent-bg);border:1px solid var(--accent-border)}
.avatar.user{background:var(--surface2);border:1px solid var(--border2)}
.bubble{max-width:82%}
.msg.user .bubble{text-align:right}
.bubble-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 3px;padding:.75rem .9rem;font-size:.85rem;line-height:1.65;color:var(--text)}
.msg.user .bubble-content{background:var(--surface2);border-color:var(--accent-border);border-radius:var(--radius-lg) var(--radius-lg) 3px var(--radius-lg)}
.bubble-time{font-size:.58rem;color:var(--muted2);margin-top:.25rem;padding:0 .15rem}

/* TYPING */
.typing-bubble{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 3px;padding:.7rem .9rem;display:inline-flex;align-items:center;gap:.35rem}
.dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.18s}
.dot:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* QUICK REPLIES */
.qr-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.9rem;max-width:760px;margin-left:auto;margin-right:auto}
.qr-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:20px;padding:.4rem .85rem;font-size:.8rem;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
.qr-btn:hover,.qr-btn:active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2)}

/* PRODUCT CARDS IN CHAT */
.chat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.6rem;margin-bottom:.9rem;max-width:760px;margin-left:auto;margin-right:auto}
.chat-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:.85rem;cursor:pointer;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent}
.chat-card:hover,.chat-card:active{border-color:var(--accent);background:var(--accent-bg)}
.chat-card.featured{border-color:var(--accent);background:var(--accent-bg)}
.cc-badge{font-size:.6rem;font-weight:700;background:rgba(108,99,255,.2);color:var(--accent2);border:1px solid var(--accent-border);padding:.16rem .45rem;border-radius:20px;display:inline-block;margin-bottom:.4rem}
.cc-name{font-size:.82rem;font-weight:700;margin:.1rem 0 .3rem;line-height:1.3}
.cc-price{font-size:.9rem;font-weight:800;color:var(--accent2)}
.cc-match{font-size:.65rem;color:var(--green);margin-top:.25rem;font-weight:500}
.cc-tags{display:flex;gap:.22rem;flex-wrap:wrap;margin-top:.35rem}
.cc-tag{background:var(--surface3);color:var(--muted);font-size:.56rem;font-weight:600;padding:.12rem .4rem;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.cc-props{display:flex;flex-direction:column;gap:.28rem;margin-top:.5rem}
.cc-prop{font-size:.68rem;font-weight:600;padding:.22rem .55rem;border-radius:6px;display:flex;align-items:center;gap:.3rem}
.cc-prop-gelände{background:rgba(108,99,255,.15);color:var(--accent2)}
.cc-prop-level{background:rgba(74,222,128,.12);color:var(--green)}
.cc-prop-pron{background:rgba(251,191,36,.1);color:var(--amber)}

/* DETAIL IN CHAT */
.chat-detail{background:var(--surface);border:1px solid var(--accent-border);border-radius:var(--radius-lg);padding:1.1rem;margin-bottom:.9rem;max-width:760px;margin-left:auto;margin-right:auto}
.cd-header{display:flex;gap:.85rem;margin-bottom:.85rem}
.cd-emoji{font-size:2.5rem;border-radius:var(--radius);width:70px;height:70px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cd-name{font-size:1rem;font-weight:800;letter-spacing:-.3px;margin-bottom:.22rem}
.cd-price{font-size:1.1rem;font-weight:800;color:var(--accent2);margin-bottom:.28rem}
.cd-desc{font-size:.8rem;color:var(--muted);line-height:1.55}
.cd-specs{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;margin:.75rem 0}
.cd-spec{background:var(--surface2);border-radius:8px;padding:.45rem .6rem}
.cd-spec-label{font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:.15rem}
.cd-spec-val{font-size:.78rem;font-weight:600}
.cd-sizes{display:flex;gap:.35rem;flex-wrap:wrap;margin:.6rem 0}
.cd-size{border:1px solid var(--border2);border-radius:7px;padding:.4rem .6rem;font-size:.82rem;cursor:pointer;background:transparent;color:var(--text);font-family:'Outfit',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent;min-width:42px;text-align:center}
.cd-size:hover,.cd-size.sel{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.cd-add{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:.78rem;font-size:.92rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}

/* INPUT */
.input-area{border-top:1px solid var(--border);background:var(--surface);padding:.75rem 1rem;padding-bottom:max(.75rem,env(safe-area-inset-bottom));flex-shrink:0}
.input-wrap{max-width:760px;margin:0 auto;display:flex;gap:.55rem;align-items:flex-end}
.input-box{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:.65rem .9rem;font-size:16px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;resize:none;min-height:42px;max-height:100px;transition:border-color .2s;-webkit-appearance:none}
.input-box::placeholder{color:var(--muted2)}
.input-box:focus{border-color:var(--accent)}
.send-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:1rem;-webkit-tap-highlight-color:transparent}
.input-hint{text-align:center;font-size:.62rem;color:var(--muted2);margin-top:.4rem;max-width:760px;margin-left:auto;margin-right:auto}

/* TOAST */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:.7rem 1.1rem;border-radius:var(--radius);font-size:.85rem;z-index:999;animation:toastIn .3s ease;display:flex;align-items:center;gap:.5rem;white-space:nowrap}
.t-ok{color:var(--green)}
@keyframes toastIn{from{transform:translateX(-50%) translateY(10px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>

let state={step:0,answers:{},selSize:null};
let cartCount=0;

function now(){return new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}

function addBot(html,qrOpts=[],extraEl=null){
  const c=document.getElementById('chat');
  const m=document.createElement('div');
  m.className='msg bot';
  m.innerHTML=`<div class="avatar bot">🤖</div><div class="bubble"><div class="bubble-content">${html}</div><div class="bubble-time">StrideShop KI · ${now()}</div></div>`;
  c.appendChild(m);
  if(extraEl){c.appendChild(extraEl)}
  if(qrOpts.length){
    const qr=document.createElement('div');
    qr.className='qr-row';qr.id='qr';
    qr.innerHTML=qrOpts.map(o=>`<button class="qr-btn" onclick="handleQR(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('');
    c.appendChild(qr);
  }
  c.scrollTop=c.scrollHeight;
}

function addUser(text){
  const c=document.getElementById('chat');
  const m=document.createElement('div');
  m.className='msg user';
  m.innerHTML=`<div class="avatar user">🧑</div><div class="bubble"><div class="bubble-content">${text}</div><div class="bubble-time">${now()}</div></div>`;
  c.appendChild(m);
  c.scrollTop=c.scrollHeight;
}

function showTyping(){
  const c=document.getElementById('chat');
  const m=document.createElement('div');
  m.className='msg bot';m.id='typing';
  m.innerHTML=`<div class="avatar bot">🤖</div><div class="bubble"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  c.appendChild(m);c.scrollTop=c.scrollHeight;
}

function removeTyping(){const t=document.getElementById('typing');if(t)t.remove()}
function removeQR(){const q=document.getElementById('qr');if(q)q.remove()}

function updateProgress(){
  const total=5,done=state.step;
  for(let i=1;i<=5;i++){
    const el=document.getElementById('ps'+i);
    if(!el)continue;
    el.className='progress-step '+(i<=done?'done':i===done+1?'active':'');
  }
  document.getElementById('progress-label').textContent=done>=5?'Auswertung fertig ✓':`Schritt ${Math.min(done+1,5)} von 5`;
}

function handleQR(btn,val){
  removeQR();
  addUser(val);
  processAnswer(val);
}

function sendMsg(){
  const b=document.getElementById('input-box');
  const t=b.value.trim();
  if(!t)return;
  b.value='';b.style.height='';
  removeQR();
  addUser(t);
  processAnswer(t);
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'}

function processAnswer(answer){
  const flow=FLOW[state.step];
  if(flow) state.answers[flow.key]=answer.toLowerCase();
  const delay=700+Math.random()*500;
  showTyping();
  setTimeout(()=>{
    removeTyping();
    state.step++;
    updateProgress();
    if(state.step<FLOW.length){
      addBot(FLOW[state.step].q,FLOW[state.step].opts);
    } else {
      showResults();
    }
  },delay);
}

function scoreProduct(p,a){
  let s=0;
  const g=a.gelände||'';
  if(g.includes('straße')&&p.gelände==='straße') s+=4;
  if(g.includes('trail')&&p.gelände==='trail') s+=4;
  if(g.includes('wettkampf')&&p.gelände==='wettkampf') s+=4;
  if(g.includes('flexibel')&&(p.gelände==='straße'||p.gelände==='trail')) s+=2;
  const l=a.level||'';
  if(l.includes('anfänger')&&p.level==='anfänger') s+=2;
  if((l.includes('regelmäßig')||l.includes('gelegentlich'))&&p.level==='alle') s+=1;
  if((l.includes('fortgeschritten')||l.includes('wettkämpfer'))&&p.level==='fortgeschritten') s+=2;
  if(l.includes('profi')&&p.level==='profi') s+=3;
  if(p.level==='alle') s+=1;
  const pr=a.pronation||'';
  if(pr.includes('überpronation')&&p.pronation==='overpronation') s+=3;
  if(pr.includes('unterpronation')&&p.pronation==='supination') s+=3;
  if(pr.includes('neutral')&&p.pronation==='neutral') s+=2;
  if(pr.includes('nicht')&&p.pronation==='neutral') s+=1;
  const b=a.budget||'';
  if(b.includes('bis 120')&&p.price<=125) s+=2;
  if(b.includes('120')&&p.price>=120&&p.price<=165) s+=2;
  if(b.includes('160')&&p.price>=155&&p.price<=205) s+=2;
  if(b.includes('200')&&p.price>=195) s+=2;
  const d=a.dämpfung||'';
  if(d.includes('minimal')&&p.dämpfung==='minimal') s+=3;
  if(d.includes('mittel')&&p.dämpfung==='mittel') s+=3;
  if(d.includes('maximal')&&p.dämpfung==='maximal') s+=3;
  return s;
}

function showResults(){
  const scored=PRODUCTS.map(p=>({...p,score:scoreProduct(p,state.answers)})).sort((a,b)=>b.score-a.score);
  const top4=scored.slice(0,4);
  state.top4=top4;

  addBot(`Perfekt – ich habe alle deine Angaben ausgewertet! 🎯<br><br>Aus unseren <strong>55 Modellen</strong> habe ich die <strong>4 besten Treffer</strong> für dich gefunden. Meine Topempfehlung: <strong>${top4[0].name}</strong>.`);

  setTimeout(()=>{
    const c=document.getElementById('chat');
    const grid=document.createElement('div');
    grid.className='chat-grid';
    grid.innerHTML=top4.map((p,i)=>{
      const pronLabel=p.pronation==='neutral'?'Neutral':p.pronation==='overpronation'?'Überpronation':'Unterpronation';
      const gelLabel=p.gelände.charAt(0).toUpperCase()+p.gelände.slice(1);
      const levelLabel=p.level==='alle'?'Alle Level':p.level.charAt(0).toUpperCase()+p.level.slice(1);
      return `
      <div class="chat-card${i===0?' featured':''}" onclick="showDetail(${p.id})">
        ${i===0?'<span class="cc-badge">⭐ Top-Empfehlung</span>':i===1?'<span class="cc-badge">👍 Sehr geeignet</span>':''}
        <span class="cc-emoji" style="display:block;font-size:2.3rem;margin-bottom:.4rem;background:${p.color};border-radius:8px;padding:.4rem;text-align:center">${p.emoji}</span>
        <div class="cc-name">${p.name}</div>
        <div class="cc-price">${p.price} €</div>
        <div class="cc-match">${['Perfekter Match','Sehr geeignet','Gute Option','Alternative'][i]}</div>
        <div class="cc-props">
          <span class="cc-prop cc-prop-gelände">${gelLabel}</span>
          <span class="cc-prop cc-prop-level">${levelLabel}</span>
          <span class="cc-prop cc-prop-pron">${pronLabel}</span>
        </div>
      </div>`;
    }).join('');
    c.appendChild(grid);
    c.scrollTop=c.scrollHeight;

    setTimeout(()=>{
      addBot('Klick auf einen Schuh für alle Details, oder frag mich einfach etwas!',[
        '🔄 Neue Beratung starten',
        '⚖️ Schuhe vergleichen'
      ]);
    },400);
  },200);
}

function showDetail(id){
  const p=PRODUCTS.find(x=>x.id===id);
  state.selSize=null;
  removeQR();
  addUser(`Zeig mir Details zum ${p.name}`);
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addBot(`Hier alle Infos zum <strong>${p.name}</strong>:`);
    const c=document.getElementById('chat');
    const d=document.createElement('div');
    d.className='chat-detail';
    d.innerHTML=`
      <div class="cd-header">
        <div class="cd-emoji" style="background:${p.color}">${p.emoji}</div>
        <div>
          <div class="cd-name">${p.name}</div>
          <div class="cd-price">${p.price} €</div>
          <div class="cd-desc">${p.desc}</div>
        </div>
      </div>
      <div class="cd-specs">
        <div class="cd-spec"><div class="cd-spec-label">Gewicht</div><div class="cd-spec-val">${p.gewicht}</div></div>
        <div class="cd-spec"><div class="cd-spec-label">Sprengung</div><div class="cd-spec-val">${p.sprengung}</div></div>
        <div class="cd-spec"><div class="cd-spec-label">Dämpfung</div><div class="cd-spec-val">${p.dämpfung}</div></div>
        <div class="cd-spec"><div class="cd-spec-label">Weite</div><div class="cd-spec-val">${p.weite}</div></div>
      </div>
      <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:.5rem">Größe wählen</div>
      <div class="cd-sizes">${p.sizes.map(s=>`<button class="cd-size" onclick="selSize(this,${s})">${s}</button>`).join('')}</div>
      <button class="cd-add" onclick="addCart('${p.name}')">In den Warenkorb legen</button>`;
    c.appendChild(d);
    setTimeout(()=>{
      addBot('Hast du noch Fragen?',[
        '🔄 Neue Beratung starten'
      ]);
    },350);
    c.scrollTop=c.scrollHeight;
  },900);
}

function selSize(el,s){
  document.querySelectorAll('.cd-size').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');state.selSize=s;
}

function addCart(name){
  if(!state.selSize){
    removeQR();
    addBot('Bitte wähle zuerst eine Größe – klick auf eine der Größen oben! 👆');
    return;
  }
  cartCount++;
  document.getElementById('cart-btn').textContent=`🛒 Warenkorb (${cartCount})`;
  removeQR();
  addBot(`✅ <strong>${name}</strong> in Größe <strong>${state.selSize}</strong> wurde hinzugefügt!<br>Möchtest du noch etwas stöbern?`,[
    '🛍️ Mehr Schuhe ansehen',
    '💳 Zur Kasse',
    '🔄 Neue Beratung'
  ]);
  showToast('✓',`${name} (Gr.${state.selSize}) hinzugefügt`);
}

function showToast(icon,msg){
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<span class="t-ok">${icon}</span>${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function handleFollowup(text){
  removeQR();
  if(!text)return;
  addUser(text);
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const tl=text.toLowerCase();
    if(tl.includes('neue beratung')||tl.includes('neu')){
      state={step:0,answers:{},selSize:null};
      updateProgress();
      addBot(FLOW[0].q,FLOW[0].opts);
    } else if(tl.includes('pronation')){
      addBot('Die <strong>Pronation</strong> beschreibt das Abrollen deines Fußes:<br><br><strong>Neutral</strong> – gleichmäßiges Abrollen (70% aller Läufer)<br><strong>Überpronation</strong> – Fuß kippt nach innen (flache Füße, Knieschmerzen möglich)<br><strong>Supination</strong> – Fuß kippt nach außen (eher selten)<br><br>Tipp: Lass dich in einem Laufladen analysieren!',['Schuhe für Überpronation','Neutrale Schuhe zeigen']);
    } else if(tl.includes('größe')){
      addBot('Faustregel für Laufschuhe:<br><br>📐 Fußlänge messen (abends, Füße sind dann am größten)<br>➕ 1,0–1,5 cm Spielraum dazurechnen<br>📏 Beispiel: 26cm Fuß → Größe 41–42<br><br>Beachte: Laufschuhe sitzen etwas weiter als Alltagsschuhe. Welchen Schuh möchtest du ausprobieren?',['Zum Apex Flow 3','Zum CloudStep 9']);
    } else if(tl.includes('vergleich')){
      const t=state.top4||[];
      if(!t.length){
        addBot('Starte zuerst eine Beratung, damit ich dir deine persönlichen Top-Schuhe vergleichen kann!',['🔄 Neue Beratung starten']);
      } else {
        const medals=['🥇','🥈','🥉','🏅'];
        const pronLabel=p=>p.pronation==='neutral'?'Neutral':p.pronation==='overpronation'?'Überpronation':'Unterpronation';
        const levelLabel=p=>p.level==='alle'?'Alle Level':p.level.charAt(0).toUpperCase()+p.level.slice(1);
        const rows=t.map((p,i)=>`${medals[i]} <strong>${p.name}</strong> – ${p.price}€ · ${p.rating}★ · ${p.gelände.charAt(0).toUpperCase()+p.gelände.slice(1)} · ${levelLabel(p)} · ${pronLabel(p)} · Dämpfung: ${p.dämpfung} · ${p.gewicht}`).join('<br><br>');
        addBot(`Hier dein persönlicher Vergleich der 4 besten Treffer:<br><br>${rows}`);
      }
    } else if(tl.includes('kasse')){
      addBot(`Dein Warenkorb enthält <strong>${cartCount} Artikel</strong>. In dieser Demo endet die Simulation hier – im echten Shop würde es jetzt zur Kasse gehen! 🛒`);
    } else {
      // try to find product by name in text
      const found=PRODUCTS.find(p=>tl.includes(p.name.toLowerCase())||tl.includes(p.brand.toLowerCase()));
      if(found){showDetail(found.id);}
      else{addBot('Ich helfe dir gerne! Du kannst auf einen Schuh klicken, nach Kategorien fragen oder einfach schreiben, was du suchst.',['Alle Empfehlungen','🔄 Neue Beratung']);}
    }
  },900);
}

// override addBot to intercept quick-reply clicks for follow-up handling
const _origQR=window.handleQR;
window.handleQR=function(btn,val){
  const step=state.step;
  removeQR();
  addUser(val);
  if(step>=FLOW.length){
    handleFollowup(val);
  } else {
    processAnswer(val);
  }
};

function restartChat(){
  state={step:0,answers:{},selSize:null};
  cartCount=0;
  document.getElementById('cart-btn').textContent='🛒 Warenkorb (0)';
  const c=document.getElementById('chat');
  while(c.firstChild)c.removeChild(c.firstChild);
  updateProgress();
  setTimeout(start,300);
}

function start(){
  updateProgress();
  setTimeout(()=>{addBot(FLOW[0].q,FLOW[0].opts)},400);
}

start();
</script>
</body>
</html>
